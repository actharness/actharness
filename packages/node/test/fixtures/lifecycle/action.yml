name: 'Lifecycle Node Action'
description: 'actharness/node fixture — pre/main/post phases with saveState/getState.'
outputs:
  main-ran:
    description: 'Set to "true" by main phase'
  cache-hit:
    description: 'Set to "true" by post if state was saved'
runs:
  using: 'node22'
  pre: 'pre.js'
  main: 'main.js'
  post: 'post.js'
