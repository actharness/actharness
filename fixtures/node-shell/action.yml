name: Node Shell Demo
description: "Exercises shell: node — inputs, outputs, env, GITHUB_ENV, GITHUB_PATH, if:, continue-on-error, working-directory, annotations, and failure path."
author: actharness

inputs:
  name:
    description: Name to greet. Optional — defaults to World.
    default: "World"
  should-fail:
    description: When true, triggers a step failure to test failure() condition.
    required: true

outputs:
  greeting:
    description: Greeting produced from the name input
    value: ${{ steps.greet.outputs.greeting }}
  env-value:
    description: Value read from the seeded env
    value: ${{ steps.read-env.outputs.env-value }}
  step-env-value:
    description: Value produced by the step-level env override
    value: ${{ steps.override-env.outputs.step-env-value }}
  restored-env:
    description: Seed env value as seen by the step after the override
    value: ${{ steps.restored-env-step.outputs.restored-env }}
  threaded-env:
    description: Value written to GITHUB_ENV in one step and read in the next
    value: ${{ steps.read-github-env.outputs.threaded-env }}
  cwd-name:
    description: Basename of the working directory used by the working-directory step
    value: ${{ steps.check-cwd.outputs.cwd-name }}
  has-custom-bin:
    description: Whether /custom/bin was prepended to PATH via GITHUB_PATH (ternary)
    value: ${{ steps.check-path.outputs.has-custom-bin }}
  has-custom-bin-explicit:
    description: Same check using explicit if/else block instead of ternary
    value: ${{ steps.check-path-explicit.outputs.has-custom-bin-explicit }}

runs:
  using: composite
  steps:
    - id: greet
      shell: node
      run: |
        const fs = require('fs');
        const name = process.env['INPUT_NAME'] || 'World';
        fs.appendFileSync(process.env['GITHUB_OUTPUT'], 'greeting=Hello, ' + name + '!\n');

    - id: read-env
      shell: node
      run: |
        const fs = require('fs');
        const val = process.env['TEST_ENV'] || '';
        fs.appendFileSync(process.env['GITHUB_OUTPUT'], 'env-value=' + val + '\n');

    - id: override-env
      shell: node
      env:
        TEST_ENV: "https://staging.example.com"
      run: |
        const fs = require('fs');
        const val = process.env['TEST_ENV'] || '';
        fs.appendFileSync(process.env['GITHUB_OUTPUT'], 'step-env-value=' + val + '\n');

    - id: restored-env-step
      shell: node
      run: |
        const fs = require('fs');
        const val = process.env['TEST_ENV'] || '';
        fs.appendFileSync(process.env['GITHUB_OUTPUT'], 'restored-env=' + val + '\n');

    - id: set-github-env
      shell: node
      run: |
        const fs = require('fs');
        fs.appendFileSync(process.env['GITHUB_ENV'], 'THREADED_VALUE=from-set-github-env\n');

    - id: read-github-env
      shell: node
      run: |
        const fs = require('fs');
        const val = process.env['THREADED_VALUE'] || '';
        fs.appendFileSync(process.env['GITHUB_OUTPUT'], 'threaded-env=' + val + '\n');

    - id: setup-subdir
      shell: node
      run: |
        require('fs').mkdirSync('subdir', { recursive: true });

    - id: check-cwd
      shell: node
      working-directory: ./subdir
      run: |
        const fs = require('fs');
        const path = require('path');
        const name = path.basename(process.cwd());
        fs.appendFileSync(process.env['GITHUB_OUTPUT'], 'cwd-name=' + name + '\n');

    - id: add-path
      shell: node
      run: |
        const fs = require('fs');
        fs.appendFileSync(process.env['GITHUB_PATH'], '/custom/bin\n');

    - id: check-path
      shell: node
      run: |
        const fs = require('fs');
        const result = (process.env['PATH'] || '').includes('/custom/bin') ? 'true' : 'false';
        fs.appendFileSync(process.env['GITHUB_OUTPUT'], 'has-custom-bin=' + result + '\n');

    - id: check-path-explicit
      shell: node
      run: |
        const fs = require('fs');
        let result;
        if ((process.env['PATH'] || '').includes('/custom/bin')) {
          result = 'true';
        } else {
          result = 'false';
        }
        fs.appendFileSync(process.env['GITHUB_OUTPUT'], 'has-custom-bin-explicit=' + result + '\n');

    - id: flaky
      shell: node
      continue-on-error: true
      run: |
        process.exit(1);

    - id: warn
      shell: node
      run: |
        process.stdout.write('::warning::low disk space\n');

    - id: trigger-failure
      if: ${{ inputs.should-fail == 'true' }}
      shell: node
      run: |
        process.stdout.write('::error::abort requested\n');
        process.exit(1);

    - id: on-failure
      if: ${{ failure() }}
      shell: node
      run: |
        process.stdout.write('failure handler ran\n');

    - id: always-runs
      if: ${{ always() }}
      shell: node
      run: |
        process.stdout.write('always handler ran\n');
