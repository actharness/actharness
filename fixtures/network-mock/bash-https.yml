name: Network Mock — bash HTTPS
description: Fixture B — HTTPS via curl (CONNECT tunnel + CA cert)

outputs:
  body:
    description: response body from curl
    value: ${{ steps.fetch.outputs.body }}

runs:
  using: composite
  steps:
    - id: fetch
      shell: bash
      run: |
        body=$(curl -sf https://api.example.com/data)
        echo "body=$body" >> "$GITHUB_OUTPUT"
